<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>QR จุดตรวจยาม — พิมพ์</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=IBM+Plex+Mono:wght@600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: #f0f0f0;
    padding: 20px;
  }

  h1.page-title {
    text-align: center;
    font-size: 18px;
    color: #333;
    margin-bottom: 24px;
    font-weight: 600;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    max-width: 800px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
    border: 1.5px solid #e0e0e0;
    page-break-inside: avoid;
    break-inside: avoid;
  }

  .card-top {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-top-icon {
    width: 36px; height: 36px;
    background: #f59e0b;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .card-top-title {
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }

  .card-top-sub {
    font-size: 11px;
    color: rgba(255,255,255,.55);
    margin-top: 2px;
  }

  .card-top-id {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #f59e0b;
    background: rgba(245,158,11,.15);
    border: 1px solid rgba(245,158,11,.3);
    border-radius: 8px;
    padding: 4px 10px;
    flex-shrink: 0;
  }

  .card-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .qr-wrap {
    background: #fff;
    border: 2px solid #e8e8e8;
    border-radius: 12px;
    padding: 10px;
    display: inline-block;
    position: relative;
  }

  .qr-wrap img {
    display: block;
    width: 180px;
    height: 180px;
    image-rendering: pixelated;
  }

  /* มุม QR frame */
  .qr-wrap::before, .qr-wrap::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: #f59e0b;
    border-style: solid;
  }
  .qr-wrap::before { top: 4px; left: 4px; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
  .qr-wrap::after  { bottom: 4px; right: 4px; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }

  .qr-data {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 6px 16px;
    letter-spacing: 1px;
  }

  .card-footer {
    border-top: 1px dashed #ddd;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-label {
    font-size: 10px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .footer-val {
    font-size: 11px;
    font-weight: 600;
    color: #555;
  }

  .scan-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #888;
    margin-top: -4px;
  }

  .scan-hint-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.4; transform:scale(1.3); }
  }

  /* ── PRINT STYLES ── */
  @media print {
    body { background: #fff; padding: 0; }
    h1.page-title { margin-bottom: 16px; }
    .grid { max-width: 100%; gap: 14px; }
    .card { box-shadow: none; border: 1.5px solid #ccc; }
    .scan-hint-dot { animation: none; background: #22c55e; }
    .no-print { display: none; }

    @page {
      size: A4;
      margin: 12mm 10mm;
    }
  }
</style>
</head>
<body>

<div class="no-print" style="text-align:center; margin-bottom:20px;">
  <button onclick="window.print()" style="
    background:#f59e0b; color:#000; border:none; border-radius:10px;
    padding:12px 32px; font-size:16px; font-weight:700;
    font-family:'Sarabun',sans-serif; cursor:pointer;
    box-shadow:0 4px 16px rgba(245,158,11,.4);
  ">🖨️ พิมพ์ / บันทึกเป็น PDF</button>
  <p style="margin-top:8px; font-size:13px; color:#888;">เลือก "Save as PDF" ในหน้าต่างปริ้นเพื่อบันทึกไฟล์</p>
</div>

<h1 class="page-title">🛡️ จุดตรวจยาม — Guard Tour Checkpoints</h1>

<div class="grid" id="grid"></div>

<script>
// ข้อมูลจุดตรวจ ให้ตรงกับที่อยู่ใน Google Sheets
const CHECKPOINTS = [
  { id: 'CP-01', name: 'ประตูทิศเหนือ',  location: 'ทางเข้าด้านเหนือ',   icon: '🚪' },
  { id: 'CP-02', name: 'ประตูทิศใต้',    location: 'ทางเข้าด้านใต้',     icon: '🚪' },
  { id: 'CP-03', name: 'คลัง สป.5',      location: 'คลังสิ่งปลูกสร้าง',  icon: '🏚️' },
  { id: 'CP-04', name: 'โรงปืนร้อย.1',   location: 'โรงเก็บอาวุธ ร้อย 1', icon: '🏭' },
  { id: 'CP-05', name: 'โรงน้ำบิ๊กกัน',  location: 'อาคารระบบน้ำ',       icon: '💧' },
  { id: 'CP-06', name: 'บ้านพักผู้พัน',  location: 'บ้านพักนายทหาร',     icon: '🏠' },
  { id: 'CP-07', name: 'บ้านพักซอย 5',   location: 'บ้านพักซอย 5',       icon: '🏘️' },
];

const grid = document.getElementById('grid');

CHECKPOINTS.forEach((cp, i) => {
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=360x360&ecc=M&data=${encodeURIComponent(cp.id)}`;

  grid.innerHTML += `
    <div class="card">
      <div class="card-top">
        <div class="card-top-icon">${cp.icon}</div>
        <div>
          <div class="card-top-title">${cp.name}</div>
          <div class="card-top-sub">${cp.location}</div>
        </div>
        <div class="card-top-id">${cp.id}</div>
      </div>

      <div class="card-body">
        <div class="qr-wrap">
          <img src="${qrUrl}" alt="QR ${cp.id}" loading="lazy">
        </div>
        <div class="qr-data">${cp.id}</div>
        <div class="scan-hint">
          <div class="scan-hint-dot"></div>
          สแกนด้วยแอปตรวจรอบยาม
        </div>
      </div>

      <div class="card-footer">
        <div>
          <div class="footer-label">ลำดับ</div>
          <div class="footer-val">จุดที่ ${String(i+1).padStart(2,'0')} / ${String(CHECKPOINTS.length).padStart(2,'0')}</div>
        </div>
        <div style="text-align:right">
          <div class="footer-label">รหัสข้อมูล QR</div>
          <div class="footer-val">${cp.id}</div>
        </div>
      </div>
    </div>`;
});
</script>

</body>
</html>
